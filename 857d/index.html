            --warning-border: #ff3b6f;
            --warning-text: #ffb3c6;
            --benefit-icon-bg: #2a2a2a;

            --btn-copy-text: #0a0a0a;

            --btn-copy-pink-bg: #ff3b6f;

            --btn-copy-pink-hover: #e62e5c;

            --text-bg: rgba(0, 0, 0, 0.55);

            --fab-border: #00e676;

        @media (prefers-color-scheme: light) {

                --bg-body: #f5f5f7;
                --bg-container: #ffffff;
                --bg-card: #f8f8fa;
                --bg-card-secondary: #efeff2;
                --bg-input: #e8e8ec;
                --text-primary: #1a1a1e;
                --text-secondary: #3a3a42;
                --text-muted: #6c6c74;
                --border-color: #e0e0e6;

            color: #0a0a0a;

            padding: 50px;
            color: var(--text-muted);
        }
    </style>
</head>

    // ==================================================================

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    async function copyAndJumpToWechat(wechat) {
        if (!wechat) return;
        try {
            await navigator.clipboard.writeText(wechat);
            showToast(`✅ 已复制微信号: ${wechat}`);
            setTimeout(() => { window.location.href = 'weixin://'; }, 200);
        } catch(e) {
            const ta = document.createElement('textarea');
            ta.value = wechat;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(`📋 已复制微信号: ${wechat}`);
            setTimeout(() => { window.location.href = 'weixin://'; }, 200);
        }
    }

    function escape(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }
