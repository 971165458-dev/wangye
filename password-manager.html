<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyuChan 加密文章密码管理面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .action-btn {
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            background-color: #e5e7eb;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .action-btn:hover {
            background-color: #3b82f6;
            color: white;
        }
        .loading { 
            display: inline-block; 
            width: 20px; 
            height: 20px; 
            border: 2px solid #f3f3f3; 
            border-top: 2px solid #ef4444; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #111827; }
            .bg-white { background-color: #1f2937; }
            .text-gray-700 { color: #e5e7eb; }
            .border-b { border-bottom-color: #374151; }
            .bg-gray-100 { background-color: #374151; }
            .bg-gray-50 { background-color: #1f2937; }
            .text-gray-600 { color: #d1d5db; }
            .action-btn {
                background-color: #374151;
                color: #e5e7eb;
            }
            .action-btn:hover {
                background-color: #3b82f6;
                color: white;
            }
        }
        .action-buttons {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-red-600 to-red-700 px-6 py-5">
                <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-2">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                    </svg>
                    RyuChan 加密文章密码管理
                </h1>
                <p class="text-red-100 text-sm mt-1">🔐 实时从 GitHub 读取，数据自动同步更新</p>
            </div>

            <div id="auth-panel" class="p-6">
                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-yellow-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        <span class="text-yellow-800 text-sm">⚠️ 此页面受密码保护，请输入管理员密码查看所有文章密码</span>
                    </div>
                </div>
                <div class="max-w-md mx-auto">
                    <label class="block text-sm font-medium text-gray-700 mb-2">🔑 管理员密码</label>
                    <input type="password" id="admin-password" class="w-full border rounded-lg px-4 py-2 mb-4 focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="请输入管理员密码" autofocus />
                    <button id="verify-btn" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg transition transform hover:scale-[1.02]">验证并查看密码</button>
                    <p id="error-msg" class="text-red-500 text-sm mt-3 hidden text-center"></p>
                </div>
            </div>

            <div id="result" class="p-4" style="display: none;">
                <div class="text-center text-gray-400 py-8">
                    <div class="loading mx-auto"></div>
                    <p class="mt-2">正在从 GitHub 加载密码列表...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置区域 ====================
        const ADMIN_PASSWORD = "ashjy123";
        
        const GITHUB_REPO_OWNER = "857d";
        const GITHUB_REPO_NAME = "RyuChan";
        const BLOG_CONTENT_PATH = "src/content/blog";
        
        // ==================== 代码开始 ====================
        const authPanel = document.getElementById('auth-panel');
        const resultDiv = document.getElementById('result');
        const verifyBtn = document.getElementById('verify-btn');
        const passwordInput = document.getElementById('admin-password');
        const errorMsg = document.getElementById('error-msg');

        // 获取请求配置（不使用认证）
        function getFetchOptions() {
            return {};
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        if (sessionStorage.getItem('admin_verified') === 'true') {
            authPanel.style.display = 'none';
            resultDiv.style.display = 'block';
            fetchPasswords();
        }

        verifyBtn.addEventListener('click', () => {
            const entered = passwordInput.value;
            if (entered === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_verified', 'true');
                authPanel.style.display = 'none';
                resultDiv.style.display = 'block';
                errorMsg.classList.add('hidden');
                fetchPasswords();
            } else {
                errorMsg.textContent = '❌ 管理员密码错误，无权查看！';
                errorMsg.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyBtn.click();
        });

        async function fetchPasswords() {
            resultDiv.innerHTML = '<div class="text-center py-8"><div class="loading mx-auto"></div><p class="mt-2 text-gray-500">正在扫描文章...</p><p class="text-xs text-gray-400 mt-1">正在从 GitHub 读取数据</p></div>';

            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/contents/${BLOG_CONTENT_PATH}`;
                const fetchOptions = getFetchOptions();
                
                const filesRes = await fetch(apiUrl, fetchOptions);
                
                if (filesRes.status === 403) {
                    const resetTime = filesRes.headers.get('X-RateLimit-Reset');
                    if (resetTime) {
                        const resetDate = new Date(parseInt(resetTime) * 1000);
                        throw new Error(`GitHub API 限制已达上限，请在 ${resetDate.toLocaleTimeString()} 后重试`);
                    }
                    throw new Error('GitHub API 限制，请稍后再试');
                }
                
                if (!filesRes.ok) {
                    if (filesRes.status === 404) {
                        throw new Error('文章目录不存在，请检查路径配置');
                    }
                    throw new Error('获取文件列表失败：HTTP ' + filesRes.status);
                }
                
                const files = await filesRes.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md') || f.name.endsWith('.mdx'));
                
                if (mdFiles.length === 0) {
                    resultDiv.innerHTML = '<div class="text-center py-8 text-gray-400"><svg class="w-12 h-12 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg><p>未找到任何文章文件</p></div>';
                    return;
                }

                const results = [];
                let processedCount = 0;
                
                resultDiv.innerHTML = `<div class="text-center py-8"><div class="loading mx-auto"></div><p class="mt-2 text-gray-500">正在读取文章内容 (0/${mdFiles.length})...</p></div>`;
                
                for (const file of mdFiles) {
                    try {
                        const progressDiv = resultDiv.querySelector('.text-center');
                        if (progressDiv) {
                            progressDiv.innerHTML = `<div class="loading mx-auto"></div><p class="mt-2 text-gray-500">正在读取文章内容 (${processedCount + 1}/${mdFiles.length})...</p><p class="text-xs text-gray-400 mt-1">${file.name}</p>`;
                        }
                        
                        const contentRes = await fetch(file.download_url, fetchOptions);
                        const content = await contentRes.text();
                        
                        const passwordMatch = content.match(/password:\s*['"]?([^'"\n]+)['"]?/);
                        
                        if (passwordMatch && passwordMatch[1].trim()) {
                            let title = '';
                            const titleMatch = content.match(/title:\s*['"]?([^'"\n]+)['"]?/);
                            if (titleMatch) {
                                title = titleMatch[1].trim();
                            } else {
                                title = file.name.replace(/\.(md|mdx)$/, '');
                            }
                            
                            const slug = file.name.replace(/\.(md|mdx)$/, '');
                            results.push({
                                title: title,
                                slug: slug,
                                password: passwordMatch[1].trim()
                            });
                        }
                        processedCount++;
                    } catch (err) {
                        console.warn('读取文件失败:', file.name, err);
                        processedCount++;
                    }
                }

                if (results.length === 0) {
                    resultDiv.innerHTML = '<div class="text-center py-8 text-gray-400"><svg class="w-12 h-12 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg><p>未找到设置密码的文章</p><p class="text-xs mt-2">提示：文章 frontmatter 中需要包含 password 字段</p></div>';
                    return;
                }

                let html = `
                    <div class="mb-4 flex justify-between items-center flex-wrap gap-2">
                        <div class="text-sm text-gray-600">
                            共找到 <span class="font-bold text-red-600">${results.length}</span> 篇加密文章
                        </div>
                        <button onclick="refreshData()" class="text-sm bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded transition">
                            🔄 刷新数据
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full border-collapse">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">📝 标题</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">🔗 Slug</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">🔐 密码</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">⚡ 操作</th>
                                    <th class="px-4 py-3 text-left text-sm font-semibold">🔗 访问</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                for (const post of results) {
                    const escapedTitle = post.title.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                    
                    const uniqueId = post.slug.replace(/[^a-zA-Z0-9]/g, '_');
                    
                    html += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="px-4 py-3 text-sm font-medium">${escapedTitle}</td>
                            <td class="px-4 py-3 text-sm font-mono text-gray-600">${post.slug}</td>
                            <td class="px-4 py-3">
                                <span class="font-mono text-sm bg-gray-100 px-2 py-1 rounded" id="pwd-${uniqueId}">${'•'.repeat(post.password.length)}</span>
                            </td>
                            <td class="px-4 py-3">
                                <div class="action-buttons">
                                    <button onclick="togglePassword('${uniqueId}', '${post.password.replace(/'/g, "\\'")}')" class="action-btn">
                                        👁️ 显示
                                    </button>
                                    <button onclick="copyPassword('${post.title.replace(/'/g, "\\'")}', '${post.password.replace(/'/g, "\\'")}')" class="action-btn">
                                        📋 复制
                                    </button>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <a href="https://${GITHUB_REPO_OWNER}.github.io/${GITHUB_REPO_NAME}/posts/${post.slug}" target="_blank" class="action-btn">
                                    🔗 访问文章
                                </a>
                            </td>
                        </tr>
                    `;
                }
                
                html += `
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-4 p-3 bg-gray-50 rounded-lg text-xs text-gray-500">
                        💡 提示：密码数据实时从 GitHub 读取，修改文章密码后刷新页面即可看到最新数据<br>
                        📋 复制功能会同时复制【文章标题】和【密码】
                    </div>
                `;
                resultDiv.innerHTML = html;
                
                showToast(`✅ 成功加载 ${results.length} 篇加密文章`);
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = `<div class="text-center py-8 text-red-500">
                    <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p>读取失败：${err.message}</p>
                    <button onclick="fetchPasswords()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">🔄 重试</button>
                </div>`;
            }
        }
        
        function refreshData() {
            fetchPasswords();
        }
        
        function togglePassword(elementId, password) {
            const element = document.getElementById(`pwd-${elementId}`);
            if (element.innerText === '•'.repeat(password.length)) {
                element.innerText = password;
            } else {
                element.innerText = '•'.repeat(password.length);
            }
        }
        
        function copyPassword(title, password) {
            const copyText = `【${title}】\n密码：${password}`;
            navigator.clipboard.writeText(copyText).then(() => {
                showToast(`✅ 已复制：${title} 的密码`);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = copyText;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(`✅ 已复制：${title} 的密码`);
            });
        }
        
        window.refreshData = refreshData;
        window.togglePassword = togglePassword;
        window.copyPassword = copyPassword;
    </script>
</body>
</html>
