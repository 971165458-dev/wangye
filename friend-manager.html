<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链数据管理器 - 完整推送</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .avatar-preview { width: 48px; height: 48px; object-fit: cover; border-radius: 50%; background: #f3f4f6; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .table-container { overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6">
    <div id="app" class="max-w-7xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- 头部 -->
            <div class="bg-gradient-to-r from-pink-600 to-rose-700 px-6 py-5">
                <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-handshake"></i> 友链数据管理器
                </h1>
                <p class="text-pink-100 text-sm mt-1">管理 friends 和 sites 数据，一键生成完整文件并推送</p>
            </div>

            <!-- 工具栏 -->
            <div class="p-4 border-b bg-gray-50 flex flex-wrap gap-3 justify-between items-center">
                <div class="flex gap-2 flex-wrap">
                    <button @click="activeTab = 'friends'" :class="{'bg-pink-600 text-white': activeTab === 'friends', 'bg-gray-200': activeTab !== 'friends'}" class="px-4 py-2 rounded-lg text-sm font-medium transition">Friends 管理</button>
                    <button @click="activeTab = 'sites'" :class="{'bg-pink-600 text-white': activeTab === 'sites', 'bg-gray-200': activeTab !== 'sites'}" class="px-4 py-2 rounded-lg text-sm font-medium transition">Sites 管理</button>
                </div>
                <div class="flex gap-2">
                    <button @click="addItem" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><i class="fas fa-plus"></i> 添加</button>
                    <button @click="exportData" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><i class="fas fa-download"></i> 导出 JSON</button>
                    <label class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 cursor-pointer">
                        <i class="fas fa-upload"></i> 导入 JSON
                        <input type="file" @change="importData" accept=".json" class="hidden">
                    </label>
                    <button @click="generateCode" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><i class="fas fa-code"></i> 生成代码</button>
                    <button @click="showPushModal = true" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><i class="fab fa-github"></i> 推送到 GitHub</button>
                </div>
            </div>

            <!-- Friends 表格 -->
            <div v-show="activeTab === 'friends'" class="p-4">
                <div class="table-container">
                    <table class="min-w-[900px] w-full text-sm border-collapse">
                        <thead class="bg-gray-100">
                            <tr><th class="px-3 py-2 w-8"></th><th class="px-3 py-2 text-left">头像</th><th class="px-3 py-2 text-left">名称</th><th class="px-3 py-2 text-left">描述</th><th class="px-3 py-2 text-left">链接</th><th class="px-3 py-2 text-left">徽章</th><th class="px-3 py-2 w-16">操作</th></tr>
                        </thead>
                        <tbody>
                            <tr v-for="(item, idx) in friends" :key="idx" class="border-b hover:bg-gray-50">
                                <td class="px-3 py-2"><i class="drag-handle fas fa-grip-vertical text-gray-400"></i></td>
                                <td class="px-3 py-2"><div class="flex items-center gap-2"><img :src="item.avatar" class="avatar-preview" @error="item.avatar = 'https://via.placeholder.com/48?text=No+Image'"><input v-model="item.avatar" class="w-40 border rounded px-1 py-1 text-xs" placeholder="图片URL"></div></td>
                                <td class="px-3 py-2"><input v-model="item.name" class="w-32 border rounded px-2 py-1"></td>
                                <td class="px-3 py-2"><input v-model="item.description" class="w-48 border rounded px-2 py-1"></td>
                                <td class="px-3 py-2"><input v-model="item.url" class="w-56 border rounded px-2 py-1 text-xs"></td>
                                <td class="px-3 py-2"><input v-model="item.badge" class="w-24 border rounded px-2 py-1" placeholder="可选"></td>
                                <td class="px-3 py-2"><button @click="removeFriend(idx)" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Sites 表格 -->
            <div v-show="activeTab === 'sites'" class="p-4">
                <div class="table-container">
                    <table class="min-w-[500px] w-full text-sm border-collapse">
                        <thead class="bg-gray-100"><tr><th class="px-3 py-2 w-8"></th><th class="px-3 py-2 text-left">名称</th><th class="px-3 py-2 text-left">链接</th><th class="px-3 py-2 w-16">操作</th></tr></thead>
                        <tbody>
                            <tr v-for="(item, idx) in sites" :key="idx" class="border-b hover:bg-gray-50">
                                <td class="px-3 py-2"><i class="drag-handle fas fa-grip-vertical text-gray-400"></i></td>
                                <td class="px-3 py-2"><input v-model="item.name" class="w-48 border rounded px-2 py-1"></td>
                                <td class="px-3 py-2"><input v-model="item.url" class="w-64 border rounded px-2 py-1 text-xs"></td>
                                <td class="px-3 py-2"><button @click="removeSite(idx)" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div v-if="(activeTab === 'friends' && friends.length === 0) || (activeTab === 'sites' && sites.length === 0)" class="p-8 text-center text-gray-400">
                <i class="fas fa-inbox text-4xl mb-2"></i><p>暂无数据，点击“添加”按钮创建</p>
            </div>
        </div>

        <!-- 生成代码模态框 -->
        <div v-if="showCodeModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" @click.self="showCodeModal=false">
            <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[80vh] flex flex-col">
                <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl"><h3 class="text-lg font-semibold">生成的完整文件内容（可直接替换 friend.astro）</h3><button @click="showCodeModal=false" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times"></i></button></div>
                <div class="flex-1 overflow-auto p-4"><pre class="bg-gray-900 text-gray-100 p-4 rounded-lg text-sm overflow-x-auto"><code>{{ generatedCode }}</code></pre></div>
                <div class="px-6 py-3 border-t flex justify-end gap-2 bg-gray-50 rounded-b-xl"><button @click="copyCode" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm">复制代码</button><button @click="showCodeModal=false" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded-lg text-sm">关闭</button></div>
            </div>
        </div>

        <!-- 推送配置模态框 -->
        <div v-if="showPushModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" @click.self="showPushModal=false">
            <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full">
                <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl"><h3 class="text-lg font-semibold">推送到 GitHub 仓库</h3><button @click="showPushModal=false" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times"></i></button></div>
                <div class="p-6 space-y-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">GitHub Token</label><input type="password" v-model="githubToken" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="ghp_xxxxxxxxxxxx"><p class="text-xs text-gray-500 mt-1">需要 <code>repo</code> 权限。 <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" class="text-blue-600">点击创建 Token</a></p></div>
                    <div><label class="flex items-center gap-2"><input type="checkbox" v-model="saveToken" class="rounded"><span class="text-sm text-gray-600">记住 Token（保存在本机，下次自动填写）</span></label></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">仓库 (owner/repo)</label><input v-model="repoName" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="857d/RyuChan"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">文件路径</label><input v-model="filePath" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="src/pages/friend.astro"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">提交信息</label><input v-model="commitMsg" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="chore: update friends data"></div>
                    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 text-sm text-yellow-800"><i class="fas fa-info-circle mr-1"></i> 注意：推送将使用完整模板替换整个文件，请确保模板结构正确。</div>
                </div>
                <div class="px-6 py-3 border-t flex justify-end gap-2 bg-gray-50 rounded-b-xl"><button @click="showPushModal=false" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded-lg text-sm">取消</button><button @click="pushToGitHub" :disabled="pushing" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2"><i v-if="pushing" class="fas fa-spinner fa-spin"></i>{{ pushing ? '推送中...' : '确认推送' }}</button></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        // 默认数据
        const defaultFriends = [
            { name: "开盒", avatar: "https://picbed.xiaozhangya.xin/picbed/20250726181930154.png", description: "人间四月芳菲尽！", url: "https://t.me/Ash662", badge: "认证" },
            { name: "代开会员", avatar: "https://picbed.xiaozhangya.xin/picbed/20250726181930154.png", description: "代开三个月起，六个月价格优惠！", url: "https://t.me/Ash662", badge: "认证" },
            { name: "代找资源", avatar: "https://picbed.xiaozhangya.xin/picbed/20250726181930154.png", description: "Creazing a better world with code.", url: "https://t.me/Ash662", badge: "认证" }
        ];
        const defaultSites = [
            { name: "在线中", url: "https://t.me/Ash662" }
        ];

        // 完整文件模板（基于您提供的 friend.astro）
        const getFullFileContent = (friends, sites) => `---
import BaseLayout from "@/layouts/BaseLayout.astro";
import { Icon } from "astro-icon/components";
import FriendCard from "@/components/mdx/FriendCard.astro";
import Showcase from "@/components/mdx/Showcase.astro";

const friends = ${JSON.stringify(friends, null, 2)};

const sites = ${JSON.stringify(sites, null, 2)};
---

<BaseLayout title="Advertisement" isIndexed={false}>
  <!-- Advertisement Section -->
  <div class="mb-10 animate-fade-in-up">
    <h1 class="text-3xl md:text-4xl font-bold mb-4 flex items-center gap-3">
      <Icon name="lucide:users" class="text-primary" />
      <span>Friends</span>
    </h1>
    <p class="text-base-content/70 text-lg mb-6">
      本站认证。
    </p>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      {friends.map((friend) => (
        <FriendCard
          name={friend.name}
          avatar={friend.avatar}
          description={friend.description}
          url={friend.url}
          badge={friend.badge}
        />
      ))}
    </div>
  </div>

  <!-- Sites Using Ryuchan Section -->
  <div class="animate-fade-in-up" style="animation-delay: 0.2s;">
    <div class="bg-base-100 rounded-3xl p-6 md:p-8 shadow-lg border border-base-200">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
          <h2 class="text-2xl font-bold flex items-center gap-2 mb-2">
            <Icon name="lucide:layout-template" class="w-6 h-6 text-secondary" />
            <span>广告位联系</span>
          </h2>
          <p class="text-base-content/70">
            这里展示了使用 Ryuchan 主题构建的网站。
          </p>
        </div>
        <a
          href="https://t.me/Ash662"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-primary btn-sm gap-2"
        >
          <Icon name="lucide:plus-circle" class="w-4 h-4" />
          Add Your Site
        </a>
      </div>

      <div class="flex flex-wrap gap-4">
        {sites.map((site) => <Showcase name={site.name} url={site.url} />)}
      </div>
      
      <div class="mt-6 p-4 bg-base-200/50 rounded-2xl text-sm text-base-content/60 flex gap-2 items-start">
        <Icon name="lucide:info" class="w-5 h-5 flex-shrink-0 mt-0.5" />
        <p>
          想要将你的广告添加到这里吗？点击右上角的 "Add Your Site" 按钮，联系管理员来添加你的联系方式！
        </p>
      </div>
    </div>
  </div>

  <div class="divider my-6 animate-fade-in-up" style="animation-delay: 0.1s;">
    <Icon name="lucide:heart" class="w-12 h-12 text-primary/50" />
  </div>
</BaseLayout>`;

        createApp({
            setup() {
                const activeTab = ref('friends');
                const friends = ref(JSON.parse(JSON.stringify(defaultFriends)));
                const sites = ref(JSON.parse(JSON.stringify(defaultSites)));
                const showCodeModal = ref(false);
                const generatedCode = ref('');
                const showPushModal = ref(false);
                const githubToken = ref('');
                const saveToken = ref(false);
                const repoName = ref('857d/RyuChan');
                const filePath = ref('src/pages/friend.astro');
                const commitMsg = ref('chore: update friends data');
                const pushing = ref(false);

                const storedToken = localStorage.getItem('github_token_friend');
                if (storedToken) {
                    githubToken.value = storedToken;
                    saveToken.value = true;
                }

                const addItem = () => {
                    if (activeTab.value === 'friends') friends.value.push({ name: "新朋友", avatar: "", description: "", url: "", badge: "" });
                    else sites.value.push({ name: "新站点", url: "" });
                };
                const removeFriend = (idx) => { if (confirm('确定删除？')) friends.value.splice(idx, 1); };
                const removeSite = (idx) => { if (confirm('确定删除？')) sites.value.splice(idx, 1); };
                const exportData = () => {
                    const exportObj = { friends: friends.value, sites: sites.value };
                    const dataStr = JSON.stringify(exportObj, null, 2);
                    const blob = new Blob([dataStr], {type: "application/json"});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'friend-data.json';
                    a.click();
                    URL.revokeObjectURL(url);
                };
                const importData = (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = JSON.parse(e.target.result);
                            if (data.friends && Array.isArray(data.friends)) friends.value = data.friends;
                            if (data.sites && Array.isArray(data.sites)) sites.value = data.sites;
                            alert('导入成功');
                        } catch (err) { alert('解析失败：' + err.message); }
                    };
                    reader.readAsText(file);
                };
                const generateCode = () => {
                    generatedCode.value = getFullFileContent(friends.value, sites.value);
                    showCodeModal.value = true;
                };
                const copyCode = () => {
                    navigator.clipboard.writeText(generatedCode.value);
                    alert('代码已复制到剪贴板');
                };

                const pushToGitHub = async () => {
                    if (!githubToken.value) { alert('请输入 GitHub Token'); return; }
                    if (!repoName.value) { alert('请输入仓库名'); return; }
                    if (!filePath.value) { alert('请输入文件路径'); return; }
                    pushing.value = true;
                    try {
                        const fullContent = getFullFileContent(friends.value, sites.value);
                        const encodedContent = btoa(unescape(encodeURIComponent(fullContent)));
                        const getUrl = `https://api.github.com/repos/${repoName.value}/contents/${filePath.value}`;
                        let sha = null;
                        try {
                            const getRes = await fetch(getUrl, { headers: { Authorization: `token ${githubToken.value}` } });
                            if (getRes.ok) {
                                const data = await getRes.json();
                                sha = data.sha;
                            }
                        } catch (err) { /* 文件不存在，将创建 */ }
                        const putBody = { message: commitMsg.value, content: encodedContent, branch: 'main' };
                        if (sha) putBody.sha = sha;
                        const putRes = await fetch(`https://api.github.com/repos/${repoName.value}/contents/${filePath.value}`, {
                            method: 'PUT',
                            headers: { Authorization: `token ${githubToken.value}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify(putBody)
                        });
                        if (putRes.ok) {
                            if (saveToken.value) localStorage.setItem('github_token_friend', githubToken.value);
                            else localStorage.removeItem('github_token_friend');
                            alert('✅ 推送成功！博客将自动重新部署。');
                            showPushModal.value = false;
                        } else {
                            const err = await putRes.json();
                            alert('推送失败：' + (err.message || '未知错误'));
                        }
                    } catch (err) { alert('推送失败：' + err.message); }
                    finally { pushing.value = false; }
                };

                return {
                    activeTab, friends, sites, showCodeModal, generatedCode, showPushModal,
                    githubToken, saveToken, repoName, filePath, commitMsg, pushing,
                    addItem, removeFriend, removeSite, exportData, importData, generateCode, copyCode, pushToGitHub
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
